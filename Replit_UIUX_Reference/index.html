        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f5f6; color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; letter-spacing: -0.5px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; padding: 20px; width: 100%; box-sizing: border-box; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        /* The images will crop to 400px by default, hover to reveal full height safely */
        .img-container { height: 400px; overflow: hidden; }
        .img-container img { width: 100%; display: block; border-bottom: 1px solid #ddd; object-fit: cover; object-position: top; transition: margin-top 0.5s ease-in-out; }
        .card .title { padding: 15px; font-weight: bold; text-align: center; word-break: break-all; background: #fff; z-index: 10; position: relative; }
    </style>
</head>
